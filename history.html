<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RJTT · Past-day observations</title>
<script>
/* no-flash theme (same as dashboard) */
(function(){try{var t=localStorage.getItem("rjtt_theme");if(t==="dark"||(t===null&&window.matchMedia&&window.matchMedia("(prefers-color-scheme: dark)").matches))document.documentElement.setAttribute("data-theme","dark");}catch(e){}})();
</script>
<link rel="stylesheet" href="styles.css">
<style>
  .hist-wrap{max-width:1080px; margin:0 auto; padding:18px}
  .hist-controls{display:flex; gap:10px; align-items:center; flex-wrap:wrap; margin:14px 0 16px}
  .hist-controls input[type="date"]{
    font-family:var(--mono); font-size:15px; padding:8px 10px; border-radius:9px;
    border:1px solid var(--ink-soft); background:transparent; color:var(--ink);
  }
  .navbtn{font-family:var(--mono); font-size:15px; padding:7px 12px; border-radius:9px; cursor:pointer;
    background:transparent; border:1px solid var(--ink-soft); color:var(--ink)}
  .navbtn:hover{background:var(--accent); border-color:var(--accent); color:#fff}
  .wubtn{font-family:var(--mono); font-size:12.5px; color:var(--jma); font-weight:600; text-decoration:underline; margin-left:auto}
  .sumgrid{display:grid; grid-template-columns:repeat(auto-fit,minmax(190px,1fr)); gap:0}
  .sumgrid>div{padding:16px 18px; border-right:1px solid rgba(255,255,255,.08); overflow:hidden}
  .sumgrid>div:last-child{border-right:none}
  /* keep the big numbers inside their cells at any width */
  .sumgrid .big{font-size:clamp(26px, 3.1vw, 42px); line-height:1.05; white-space:nowrap}
  .sumgrid .mid{white-space:nowrap}
  table.obs{width:100%; border-collapse:collapse; font-family:var(--mono); font-size:13.5px; font-variant-numeric:tabular-nums}
  table.obs th{font-size:11px; letter-spacing:.14em; text-transform:uppercase; color:var(--ink-soft);
    text-align:left; padding:10px 14px; border-bottom:1px solid rgba(255,255,255,.12); position:sticky; top:0; backdrop-filter:blur(8px)}
  table.obs td{padding:8px 14px; border-bottom:1px solid rgba(255,255,255,.05)}
  table.obs tr.mx td{color:var(--accent); font-weight:700}
  .tbl-scroll{max-height:560px; overflow:auto; border-radius:0 0 14px 14px}
  .chartbox{padding:14px 16px}
  .note-line{font-family:var(--mono); font-size:12.5px; color:var(--ink-soft); padding:10px 18px}
</style>
</head>
<body>
<div id="sky"></div>
<div class="sheet hist-wrap">

  <p class="note" style="margin:10px 0"><a href="index.html" style="color:var(--jma);font-weight:600">← RJTT Nowcaster</a></p>

  <section class="panel">
    <div class="panel-head"><h2 id="hist-head">Past-day observations</h2></div>
    <div class="hist-controls" style="padding:0 16px">
      <button class="navbtn" id="prevD" title="previous day">‹</button>
      <input type="date" id="pick">
      <button class="navbtn" id="nextD" title="next day">›</button>
      <a class="wubtn" id="wulink" target="_blank" rel="noopener">settlement prints on Wunderground ↗</a>
    </div>
    <div class="sumgrid" id="summary"><div><div class="label">Loading</div><div class="mid">—</div></div></div>
    <div class="note-line" id="jr-line" style="display:none"></div>
  </section>

  <section class="panel">
    <div class="panel-head"><h2>Temperature through the day</h2></div>
    <div class="chartbox"><svg id="chart" width="100%" height="180" viewBox="0 0 1000 180" preserveAspectRatio="none"></svg></div>
  </section>

  <section class="panel">
    <div class="panel-head"><h2>All observations <span class="sub" id="res-note" style="font-weight:400"></span></h2></div>
    <div class="tbl-scroll">
      <table class="obs" id="obs">
        <thead><tr><th>Time</th><th>Temp</th><th>Wind</th><th>Rain</th><th>Humidity</th><th>Sun</th></tr></thead>
        <tbody id="obs-body"><tr><td colspan="6" class="sub" style="padding:18px">loading…</td></tr></tbody>
      </table>
    </div>
  </section>

</div>

<script>
"use strict";
/*__HREG__*/
const STATIONS={
  RJTT:{ key:"RJTT", ns:"rjtt", obs:"amedas", amedas:"44166", tz:"Asia/Tokyo", unit:"C",
    head:"Past-day observations · AMeDAS 44166 羽田",
    printMin:(m)=>(m===0||m===30),
    wu:"https://www.wunderground.com/history/daily/jp/tokyo/RJTT" },
  KMIA:{ key:"KMIA", ns:"kmia", obs:"nws", nws:"KMIA", iem:"MIA", tz:"America/New_York", unit:"F",
    head:"Past-day observations · KMIA · ASOS / NWS",
    printMin:(m)=>(m>=45),
    wu:"https://www.wunderground.com/history/daily/us/fl/miami/KMIA" }
};
let CFG=STATIONS.RJTT;
try{ CFG=STATIONS[localStorage.getItem("wx_station")]||STATIONS.RJTT; }catch(e){}
const U=CFG.unit;
const STATION=CFG.amedas||"";
const _TZF=new Intl.DateTimeFormat("en-GB",{timeZone:CFG.tz,hour12:false,year:"numeric",month:"2-digit",day:"2-digit",hour:"2-digit",minute:"2-digit"});
function _tzp(ms){ const o={}; for(const p of _TZF.formatToParts(ms==null?Date.now():ms)) o[p.type]=p.value; return o; }
function addDays(iso,n){ const d=new Date(iso+"T00:00:00Z"); d.setUTCDate(d.getUTCDate()+n); return `${d.getUTCFullYear()}-${p2(d.getUTCMonth()+1)}-${p2(d.getUTCDate())}`; }
/*__HREG_END__*/
const DIR16=["N","NNE","NE","ENE","E","ESE","SE","SSE","S","SSW","SW","WSW","W","WNW","NW","NNW"];
const p2=n=>String(n).padStart(2,"0");
const fmt1=v=>(Math.round(v*10)/10).toFixed(1);
function jstNow(){ return new Date(Date.now()+9*3600*1000); }
function jstTodayISO(){ const p=_tzp(); return `${p.year}-${p.month}-${p.day}`; }
function dir16(idx){ if(idx==null) return "—"; if(idx===0) return "calm"; return DIR16[idx%16]; }
function deg16(deg){ if(deg==null) return "—"; return DIR16[Math.round(deg/22.5)%16]; }

/* ---- parse AMeDAS block objects into 10-min rows (mirrors the dashboard parser) ---- */
function parseBlocks(objs, key){
  const rows=[];
  for(const obj of objs){
    if(!obj) continue;
    for(const [ts,v] of Object.entries(obj)){
      if(!ts.startsWith(key)) continue;
      const hh=parseInt(ts.slice(8,10),10), mm=parseInt(ts.slice(10,12),10);
      rows.push({
        t: hh+mm/60, hh, mm,
        temp: (v&&v.temp)?v.temp[0]:null,
        dir:  (v&&v.windDirection)?v.windDirection[0]:null,
        spd:  (v&&v.wind)?v.wind[0]:null,
        rain: (v&&v.precipitation10m)?v.precipitation10m[0]:null,
        hum:  (v&&v.humidity)?v.humidity[0]:null,
        sun:  (v&&v.sun10m)?v.sun10m[0]:null
      });
    }
  }
  rows.sort((a,b)=>a.t-b.t);
  return rows;
}
/* ---- day summary + the settlement read ---- */
function summarize(rows, hourly){
  const temps=rows.filter(r=>r.temp!=null&&isFinite(r.temp));
  if(!temps.length) return null;
  let mx=temps[0], mn=temps[0];
  for(const r of temps){ if(r.temp>mx.temp) mx=r; if(r.temp<mn.temp) mn=r; }
  const rain=rows.reduce((a,r)=>a+(r.rain||0),0);
  let pw=null; for(const r of rows){ if(r.spd!=null && (pw==null||r.spd>pw.spd)) pw=r; }
  let jump=null;
  if(!hourly)
  for(let i=1;i<temps.length;i++){
    const d=temps[i].temp-temps[i-1].temp;
    if(d>=0.5 && (!jump||d>jump.d)) jump={d:+d.toFixed(1), hh:temps[i].hh, mm:temps[i].mm};
  }
  let px=null;
  for(const r of temps){ if(CFG.printMin(r.mm)) px=(px==null)?r.temp:Math.max(px,r.temp); }
  const base=(px!=null)?px:mx.temp;
  const settled=Math.round(base);
  const physRound=Math.round(mx.temp);
  const spikeBetween = physRound!==settled;
  const frac=base-Math.floor(base);
  const nearEdge=Math.abs(frac-0.5)<=0.15;
  return {mx,mn,rain,pw,settled,nearEdge,jump,spikeBetween,physRound};
}

async function loadAmedas(key, isToday){
  const hours = isToday ? jstNow().getUTCHours() : 21;
  const blocks=[]; for(let b=0;b<=hours;b+=3) blocks.push(p2(b));
  const res=await Promise.allSettled(blocks.map(b=>
    fetch(`https://www.jma.go.jp/bosai/amedas/data/point/${STATION}/${key}_${b}.json`,{cache:"no-store"})
      .then(r=>r.ok?r.json():Promise.reject(r.status))));
  return parseBlocks(res.filter(x=>x.status==="fulfilled").map(x=>x.value), key);
}
async function loadHourlyFallback(iso){
  const u=`https://api.open-meteo.com/v1/forecast?latitude=35.5533&longitude=139.7811&hourly=temperature_2m,wind_speed_10m,wind_direction_10m,precipitation,relative_humidity_2m&start_date=${iso}&end_date=${iso}${U==="F"?"&temperature_unit=fahrenheit":""}&timezone=${encodeURIComponent(CFG.tz)}&wind_speed_unit=ms`;
  const r=await fetch(u,{cache:"no-store"}); if(!r.ok) throw 0;
  const j=await r.json(); const h=j.hourly||{};
  const rows=[];
  (h.time||[]).forEach((t,i)=>{
    const hh=parseInt(t.slice(11,13),10);
    rows.push({t:hh,hh,mm:0,temp:h.temperature_2m?.[i]??null,
      degdir:h.wind_direction_10m?.[i]??null, spd:h.wind_speed_10m?.[i]??null,
      rain:h.precipitation?.[i]??null, hum:h.relative_humidity_2m?.[i]??null, sun:null});
  });
  return rows;
}

function drawChart(rows){
  const svg=document.getElementById("chart");
  const temps=rows.filter(r=>r.temp!=null&&isFinite(r.temp));
  if(temps.length<2){ svg.innerHTML=""; return; }
  const vals=temps.map(r=>r.temp);
  const lo=Math.floor(Math.min(...vals))-1, hi=Math.ceil(Math.max(...vals))+1;
  const X=t=>40+(t/24)*940, Y=v=>168-((v-lo)/(hi-lo))*150;
  let g="";
  for(let h=0;h<=24;h+=3) g+=`<line x1="${X(h)}" y1="10" x2="${X(h)}" y2="168" stroke="rgba(128,140,160,.18)"/><text x="${X(h)}" y="179" font-size="10" fill="var(--ink-soft)" text-anchor="middle" font-family="var(--mono)">${p2(h%24)}</text>`;
  for(let v=lo;v<=hi;v+=1){ if((hi-lo)>8 && v%2!==0) continue; g+=`<line x1="40" y1="${Y(v)}" x2="980" y2="${Y(v)}" stroke="rgba(128,140,160,.12)"/><text x="34" y="${Y(v)+3}" font-size="10" fill="var(--ink-soft)" text-anchor="end" font-family="var(--mono)">${v}°</text>`; }
  g+=`<polyline fill="none" stroke="var(--accent)" stroke-width="2.4" points="${temps.map(r=>`${X(r.t).toFixed(1)},${Y(r.temp).toFixed(1)}`).join(" ")}"/>`;
  let mx=temps[0]; for(const r of temps) if(r.temp>mx.temp) mx=r;
  g+=`<circle cx="${X(mx.t)}" cy="${Y(mx.temp)}" r="4" fill="var(--accent)"/><text x="${X(mx.t)}" y="${Y(mx.temp)-8}" font-size="11" font-weight="700" fill="var(--accent)" text-anchor="middle" font-family="var(--mono)">${fmt1(mx.temp)}°</text>`;
  svg.innerHTML=g;
}

function renderTable(rows, hourly){
  const tb=document.getElementById("obs-body");
  if(!rows.length){ tb.innerHTML=`<tr><td colspan="6" class="sub" style="padding:18px">no observations available for this date</td></tr>`; return; }
  const jumps=new Set();
  if(!hourly){
    const ts=rows.filter(r=>r.temp!=null);
    for(let i=1;i<ts.length;i++) if(ts[i].temp-ts[i-1].temp>=0.5) jumps.add(ts[i].t);
  }
  const temps=rows.filter(r=>r.temp!=null); let mxT=null;
  if(temps.length){ mxT=temps.reduce((a,b)=>b.temp>a.temp?b:a).t; }
  tb.innerHTML=[...rows].reverse().map(r=>{
    const wind = r.spd!=null ? `${fmt1(r.spd)} m/s ${hourly?deg16(r.degdir):dir16(r.dir)}` : "—";
    return `<tr${r.t===mxT?' class="mx"':''}>
      <td>${jumps.has(r.t)?"⚡ ":""}${p2(r.hh)}:${p2(r.mm)}</td>
      <td>${r.temp!=null?fmt1(r.temp)+"°":"—"}</td>
      <td>${wind}</td>
      <td>${r.rain!=null?fmt1(r.rain)+" mm":"—"}</td>
      <td>${r.hum!=null?Math.round(r.hum)+"%":"—"}</td>
      <td>${r.sun!=null?r.sun+"/10 min":"—"}</td>
    </tr>`;
  }).join("");
}

function renderSummary(sum, iso){
  const el=document.getElementById("summary");
  if(!sum){ el.innerHTML=`<div><div class="label">No data</div><div class="mid">—</div><div class="sub">nothing recorded for this date</div></div>`; return; }
  el.innerHTML=`
    <div><div class="label">Day max</div><div class="big accent">${fmt1(sum.mx.temp)}°${U}</div><div class="sub">at ${p2(sum.mx.hh)}:${p2(sum.mx.mm)} JST</div></div>
    <div><div class="label">Settles (prints)</div><div class="big">${sum.settled}°${U}</div><div class="sub">${sum.spikeBetween?`10-min max ${fmt1(sum.mx.temp)}° spiked between prints — prints likely ${sum.settled}°`:(sum.nearEdge?"⚠ near the rounding edge — confirm the prints":"clear of the edge")}</div></div>
    <div><div class="label">Day min</div><div class="mid">${fmt1(sum.mn.temp)}°${U}</div><div class="sub">at ${p2(sum.mn.hh)}:${p2(sum.mn.mm)}</div></div>
    <div><div class="label">Rain total</div><div class="mid">${fmt1(sum.rain)} mm</div><div class="sub">from 10-min buckets</div></div>
    <div><div class="label">Peak wind</div><div class="mid">${sum.pw?fmt1(sum.pw.spd)+" m/s":"—"}</div><div class="sub">${sum.pw?dir16(sum.pw.dir)+" at "+p2(sum.pw.hh)+":"+p2(sum.pw.mm):""}</div></div>
    <div><div class="label">Fastest 10-min climb</div><div class="mid">${sum.jump?"⚡ +"+fmt1(sum.jump.d)+"°":"steady"}</div><div class="sub">${sum.jump?"at "+p2(sum.jump.hh)+":"+p2(sum.jump.mm)+" — jump day":"no 10-min step ≥ +0.5°"}</div></div>`;
  // journal cross-reference
  try{
    const j=JSON.parse(localStorage.getItem(CFG.ns+"_jr_v1")||"{}");
    const e=j[iso], line=document.getElementById("jr-line");
    if(e && e.lock){
      const graded=e.actual!=null;
      const sVal=(e.actualS!=null)?e.actualS:e.actual;
      const hit=graded && sVal===e.lock.bucket;
      line.style.display="block";
      line.textContent=`Your journal that day: locked ${e.lock.bucket}° at 10:30 JST`+
        (graded?` · settled ${sVal}° (phys ${fmt1(e.actualX)}°) → ${hit?"HIT ✓":"MISS ✗"}`:" · not graded yet");
    } else line.style.display="none";
  }catch(e){}
}

/*__KPARSE__*/
function _degIdx(deg){ if(deg==null) return null; const i=Math.round(deg/22.5)%16; return i===0?16:i; }
function _uT(c){ return c==null?null:(U==="F"? c*9/5+32 : c); }
function parseNWSFeatures(features, iso){
  const rows=[];
  for(const f of (features||[])){
    const p=f&&f.properties; if(!p||!p.timestamp) continue;
    const tp=_tzp(Date.parse(p.timestamp));
    if(`${tp.year}-${tp.month}-${tp.day}`!==iso) continue;
    const hh=(+tp.hour)%24, mm=+tp.minute;
    let spd=(p.windSpeed&&p.windSpeed.value!=null)?p.windSpeed.value:null;
    if(spd!=null && String(p.windSpeed.unitCode||"").indexOf("km_h")>=0) spd=spd/3.6;
    rows.push({ t:hh+mm/60, hh, mm,
      temp:(p.temperature&&p.temperature.value!=null)?+_uT(p.temperature.value).toFixed(1):null,
      dir:_degIdx(p.windDirection&&p.windDirection.value), spd,
      rain:null, hum:(p.relativeHumidity&&p.relativeHumidity.value!=null)?p.relativeHumidity.value:null, sun:null });
  }
  rows.sort((a,b)=>a.t-b.t);
  return rows;
}
async function loadNWSDay(iso){
  const s0=addDays(iso,-1), e0=addDays(iso,1);
  const r=await fetch(`https://api.weather.gov/stations/${CFG.nws}/observations?start=${s0}T12:00:00Z&end=${e0}T12:00:00Z`,{cache:"no-store",headers:{accept:"application/geo+json"}});
  if(!r.ok) throw 0;
  return parseNWSFeatures((await r.json()).features, iso);
}
function parseIEMCsv(text, iso){
  const lines=String(text||"").trim().split(/\r?\n/);
  if(lines.length<2) return [];
  const H=lines[0].split(",").map(x=>x.trim().toLowerCase());
  const ix=n=>H.findIndex(h=>h.indexOf(n)>=0);
  const iv=ix("valid"), it=ix("tmpf"), idd=ix("drct"), isk=ix("sknt");
  if(iv<0||it<0) return [];
  const out=[];
  for(let i=1;i<lines.length;i++){
    const c=lines[i].split(",");
    if(c.length<=Math.max(iv,it)) continue;
    const raw=c[iv].trim();
    const ms=Date.parse(raw.indexOf("T")>=0?raw:(raw.replace(" ","T")+(raw.indexOf("Z")>=0?"":":00Z")));
    if(!isFinite(ms)) continue;
    const tp=_tzp(ms);
    if(`${tp.year}-${tp.month}-${tp.day}`!==iso) continue;
    const hh=(+tp.hour)%24, mm=+tp.minute;
    const tf=parseFloat(c[it]); const t=isFinite(tf)?(U==="F"?tf:(tf-32)*5/9):null;
    const dg=idd>=0?parseFloat(c[idd]):NaN; const sk=isk>=0?parseFloat(c[isk]):NaN;
    out.push({ t:hh+mm/60, hh, mm, temp:t!=null?+t.toFixed(1):null,
      dir:isFinite(dg)?_degIdx(dg):null, spd:isFinite(sk)?sk*0.5144:null, rain:null, hum:null, sun:null });
  }
  out.sort((a,b)=>a.t-b.t);
  return out;
}
async function loadIEMDay(iso){
  const e0=addDays(iso,1);
  const url=`https://mesonet.agron.iastate.edu/cgi-bin/request/asos1min.py?station=${CFG.iem}&vars=tmpf&vars=drct&vars=sknt&sts=${iso}T00:00Z&ets=${e0}T06:00Z&sample=1min&what=download&tz=UTC&delim=comma&gis=no`;
  const r=await fetch(url,{cache:"no-store"});
  if(!r.ok) throw 0;
  return parseIEMCsv(await r.text(), iso);
}
function thinWithMax(rows, mod){
  const t=rows.filter(r=>r.temp!=null);
  if(!t.length) return rows;
  let mx=t[0]; for(const r of t) if(r.temp>mx.temp) mx=r;
  const out=rows.filter(r=> (r.mm%mod===0) || r===mx );
  return out;
}
/*__KPARSE_END__*/
async function loadDay(iso){
  document.getElementById("obs-body").innerHTML=`<tr><td colspan="6" class="sub" style="padding:18px">loading ${iso}…</td></tr>`;
  document.getElementById("res-note").textContent="";
  const key=iso.replace(/-/g,"");
  const [y,m,d]=iso.split("-").map(Number);
  document.getElementById("wulink").href=`${CFG.wu}/date/${y}-${m}-${d}`;
  const isToday = iso===jstTodayISO();
  let rows=[], hourly=false, src="";
  if(CFG.obs==="amedas"){
    try{ rows=await loadAmedas(key, isToday); }catch(e){}
    if(rows.some(r=>r.temp!=null)) src="· 10-minute AMeDAS observations";
  } else {
    if(iso >= addDays(jstTodayISO(), -6)){
      try{ rows=await loadNWSDay(iso); }catch(e){}
      if(rows.some(r=>r.temp!=null)) src="· NWS observations (METAR prints + specials)";
    }
    if(!rows.some(r=>r.temp!=null)){
      try{ const rr=await loadIEMDay(iso); if(rr.some(r=>r.temp!=null)){ rows=rr; src="· 1-minute ASOS (IEM archive, 1–2 day lag)"; } }catch(e){}
    }
  }
  if(!rows.some(r=>r.temp!=null)){
    try{ rows=await loadHourlyFallback(iso); hourly=true; src="· station feed unavailable for this date — hourly model reanalysis shown"; }catch(e){ rows=[]; }
  }
  document.getElementById("res-note").textContent=src;
  const sumRows = rows.length>200 ? thinWithMax(rows,10) : rows;
  const tblRows = rows.length>400 ? thinWithMax(rows,5)  : rows;
  renderSummary(summarize(sumRows, hourly), iso);
  drawChart(rows);
  renderTable(tblRows, hourly);
}

/* ---- wiring ---- */
const pick=document.getElementById("pick");
document.getElementById("hist-head").textContent=CFG.head;
document.title=CFG.key+" · Past-day observations";
pick.max=jstTodayISO(); pick.value=jstTodayISO();
pick.addEventListener("change", ()=>{ if(pick.value) loadDay(pick.value); });
function shift(days){
  const d=new Date(pick.value+"T00:00:00Z"); d.setUTCDate(d.getUTCDate()+days);
  const iso=`${d.getUTCFullYear()}-${p2(d.getUTCMonth()+1)}-${p2(d.getUTCDate())}`;
  if(iso>pick.max) return;
  pick.value=iso; loadDay(iso);
}
document.getElementById("prevD").addEventListener("click", ()=>shift(-1));
document.getElementById("nextD").addEventListener("click", ()=>shift(1));
loadDay(pick.value);
</script>
</body>
</html>
